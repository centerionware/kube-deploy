apiVersion: v1
kind: ServiceAccount
metadata:
  name: evmon
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: evmon-role
  namespace: default
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitor.evmon.io"]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: evmon-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: evmon
    namespace: default
roleRef:
  kind: Role
  name: evmon-role
  apiGroup: rbac.authorization.k8s.io