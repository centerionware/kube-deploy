apiVersion: apps/v1
kind: Deployment
metadata:
  name: evmon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evmon
  template:
    metadata:
      labels:
        app: evmon
    spec:
      containers:
        - name: evmon
          image: ghcr.io/centerionware/evmon:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EVMON_DB_TYPE
              value: "sqlite" # default, can be overridden by overlays
            - name: EVMON_DATABASE_URL
              value: "file:evmon.db?_foreign_keys=on"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30