apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: evmonendpoints.evmon.centerionware.com
spec:
  group: evmon.centerionware.com
  names:
    kind: EvmonEndpoint
    plural: evmonendpoints
    singular: evmonendpoint
    shortNames:
      - evmon
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                serviceID:
                  type: string
                intervalSeconds:
                  type: integer