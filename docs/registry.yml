############################################
# NAMESPACES
############################################
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
############################################
# STORAGE (10Gi, local-path)
############################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-pvc
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
############################################
# DOCKER REGISTRY
# :contentReference[oaicite:0]{index=0}
############################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: registry
  name: registry
  namespace: registry
spec:
  ports:
  - nodePort: 31999
    port: 5000
    protocol: TCP
    targetPort: 5000
  selector:
    app: registry
  type: NodePort
---
############################################
# REGISTRY BLOB GARBAGE COLLECTION
#
# Tag cleanup is owned by the kube-deploy operator: after every successful
# build it deletes the app's old tags (digest-aware, so a manifest shared
# with the current tag is never removed). Do NOT prune tags here — a previous
# version of this CronJob sorted tags alphabetically and deleted by digest,
# which routinely erased the *current* image and left apps unable to pull.
#
# This job only reclaims disk from blobs whose manifests were already
# deleted. Weekly off-hours schedule: GC racing a concurrent image push can
# corrupt that push, so keep it away from busy build windows.
############################################
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: registry
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: gc
              image: registry:2
              command:
                - registry
                - garbage-collect
                - --delete-untagged
                - /etc/docker/registry/config.yml
              volumeMounts:
                - name: data
                  mountPath: /var/lib/registry
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: registry-pvc