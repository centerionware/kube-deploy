apiVersion: kube-deploy.centerionware.app/v1alpha1
kind: ContainerApp
metadata:
  name: livekit
  namespace: livekit
spec:
  image: livekit/livekit-server:latest

  run:
    command: ["/livekit-server", "--config", "/etc/livekit/config.yaml"]
    port: 7880
    replicas: 1
    enableServiceLinks: false

    resources:
      cpuRequest: 100m
      memoryRequest: 256Mi
      cpuLimit: 2000m
      memoryLimit: 1Gi

    volumes:
      - name: livekit-config
        mountPath: /etc/livekit
        configMap:
          name: livekit-config
          items:
            - key: config.yaml
              path: config.yaml

  service:
    type: ClusterIP
    ports:
      - name: http
        port: 7880
        targetPort: 7880
        protocol: TCP
      - name: rtc-tcp
        port: 7881
        targetPort: 7881
        protocol: TCP
    portRanges:
      - start: 50000
        end: 50200
        protocol: UDP
    annotations:
      netbird.io/expose: "true"
      netbird.io/groups: "media"

  resources:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: livekit-config
        namespace: livekit
      data:
        config.yaml: |
          port: 7880

          rtc:
            tcp_port: 7881
            port_range_start: 50000
            port_range_end: 50200
            use_external_ip: false

          keys:
            devkey: devsecret

          logging:
            level: info
            json: false

          turn:
            enabled: false