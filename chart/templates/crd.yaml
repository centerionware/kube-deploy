apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: npmapps.npm.centerionware.app
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"

spec:
  group: npm.centerionware.app
  scope: Namespaced

  names:
    plural: npmapps
    singular: npmapp
    kind: NpmApp
    shortNames: ["npm"]

  versions:
    - name: v1alpha1
      served: true
      storage: true

      subresources:
        status: {}

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object
              required: ["repo"]

              properties:
                repo:
                  type: string

                env:
                  type: object
                  additionalProperties:
                    type: string

                build:
                  type: object
                  properties:
                    baseImage:
                      type: string
                    installCmd:
                      type: string
                    buildCmd:
                      type: string
                    output:
                      type: string
                    args:
                      type: array
                      items:
                        type: string
                    registry:
                      type: string
                      default: "registry.registry.svc.cluster.local:5000"
                      description: "Registry to push built images to. Must be reachable from buildkitd."

                run:
                  type: object
                  properties:
                    command:
                      type: array
                      items:
                        type: string
                    args:
                      type: array
                      items:
                        type: string
                    port:
                      type: integer
                      default: 3000
                    registry:
                      type: string
                      default: "localhost:31999"
                      description: "Registry to pull images from. Must be reachable from containerd on cluster nodes."

                service:
                  type: object
                  properties:
                    annotations:
                      type: object
                      additionalProperties:
                        type: string

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                image:
                  type: string
                commit:
                  type: string
                lastUpdate:
                  type: string