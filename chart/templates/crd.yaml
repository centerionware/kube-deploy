apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: npmapps.npm.centerionware.app

spec:
  group: npm.centerionware.app
  scope: Namespaced

  names:
    plural: npmapps
    singular: npmapp
    kind: NpmApp
    shortNames: ["npm"]

  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object
              required: ["name", "repo"]

              properties:
                name:
                  type: string

                repo:
                  type: string

                build:
                  type: object
                  properties:
                    installCommand:
                      type: string
                    buildCommand:
                      type: string

                run:
                  type: object
                  properties:
                    command:
                      type: string
                    port:
                      type: integer

                service:
                  type: object
                  properties:
                    name:
                      type: string
                    port:
                      type: integer
                    annotations:
                      type: object
                      additionalProperties:
                        type: string

                env:
                  type: object
                  additionalProperties:
                    type: string